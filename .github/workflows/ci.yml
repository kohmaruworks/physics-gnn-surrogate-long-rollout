# OSS: Julia で参照 JSON 生成 → Python でインデックス変換スモーク → train.py 少量エポック
name: CI

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: "1.10"

      - name: Julia instantiate
        run: julia --project=. -e 'using Pkg; Pkg.instantiate()'

      - name: Generate Step 1 wave JSON (Julia)
        run: julia --project=. data_generation/generate_wave_data.jl

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies (CPU PyTorch)
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install "numpy>=1.24" "torch-geometric>=2.4.0"

      - name: Index conversion smoke test (Julia 1-based → PyG 0-based)
        run: |
          python << 'PYEOF'
          import sys
          from pathlib import Path

          root = Path.cwd()
          sys.path.insert(0, str(root / "surrogate_model"))

          import torch
          from utils.index_converter import (
              assert_valid_python_edge_index,
              convert_julia_to_python_indices,
          )

          ei_julia = torch.tensor([[1, 2], [2, 3]], dtype=torch.long).t().contiguous()
          ei = convert_julia_to_python_indices(ei_julia, num_nodes=10)
          assert ei.shape == (2, 2), ei.shape
          assert torch.equal(ei, torch.tensor([[0, 1], [1, 2]])), ei
          assert_valid_python_edge_index(ei, num_nodes=10)
          print("index_converter smoke OK")
          PYEOF

      - name: Smoke train Step 1 (train.py, few epochs, CPU)
        run: >
          python surrogate_model/train.py
          --epochs 2
          --cpu
          --rollout-min 3
          --rollout-max 8
